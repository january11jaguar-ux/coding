<html>
    <head>
        <title>Perimeter calculator</title>
        <style>
            body{
                background-color: aqua;
            }
        </style>
    </head>
    <body>
        <div id="box">
            <h1>Perimeter Calculator</h1>
            <button onclick="startCalculator()">Start calculator</button>
        </div>

        <script>
            function startCalculator(){
                var choice= prompt(
                    "Welcome to area calculator.\n\n"+
                    "Enter your choice \n"+
                    "1 Perimeter of a Rectangle \n"+
                    "2 Perimeter of a Triangle \n"+
                    "3 Perimeter of a Circle \n"+
                    "4 Perimeter of a Parallologram\n"
                 )
                 if(choice==1){
                    var l = prompt("Enter the legnth : ")
                    var w = prompt("Enter the width : ")
                    if(l&&w){
                        var result = Number(l)*2+Number(w)*2
                        alert("Perimeter of Rectangle is :"+ result )
                    }
                 }else if(choice==2){
                    var h = prompt("Enter the height : ")
                    var b = prompt("Enter the base : ")
                    var hg = prompt ("Enter the last side : ")
                    if(h&&b&&hg){
                        var result = Number(h)+Number(b)+Number(hg)
                        alert("Perimeter of Triangle is :"+ result )
                    }
                 }else if(choice==3){
                    var r = prompt("Enter the radius : ")
                    if(r){
                        var result = 3.14*Number(r)*2
                        alert("Perimeter of Circle is :"+ result )
                    }
                 }else if(choice==4){
                    var height = prompt("Enter the height : ")
                    var base= prompt("Enter the base : ")
                    if(height&&base){
                        var result = 2*Number(height)+Number(base)*2
                        alert("Area of Parralelogram is :"+ result )
                    }
                 } else{
                    alert ("invalid choice please choose between 1,2,3 and 4")
                 }
            }
        </script>
    </body>
</html>
