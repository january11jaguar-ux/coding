<html>
    <head>
        <title>Sliders</title>
        <style>
            body{
        margin:0;
        font-family:sans-serif;
        background:black;
        color:lime;
        }
        .slideshow-container{
        max-width:800px;
        margin:auto;
        position:relative;
        }
        
        .mySlides{
        display:none;
        }
        
        .mySlides img{
        width:100%;
        border-radius:6px;
        }
        .text{
        position:absolute;
        bottom:15px;
        left:15px;
        background:rgba(0,0,0,0.5);
        padding:6px 12px;
        border-radius:4px;
        font-size:18px;
        }
        .prev,.next{
        position:absolute;
        top:50%;
        transform:translateY(-50%);
        font-size:24px;
        padding:10px;
        cursor:pointer;
        color:white;
        }
        .prev{
        left:10px;
        }
        
        .next{
        right:10px;
        }
        .dots{
        text-align:center;
        margin:12px;
        }
        .dot{
        height:12px;
        width:12px;
        background:#bbb;
        border-radius:50%;
        display:inline-block;
        margin:0 4px;
        cursor:pointer;
        }
        .active{
        background:white;
        }
        </style>
    </head>
    <body>
        <div class="slider-container">
            <div class="myslides fade">
                <img src="https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?cs=srgb&dl=pexels-souvenirpixels-417074.jpg&fm=jpg" alt="Nature">
                <div class="text">Beautiful Nature</div>
            </div>
            <div class="myslides fade">
                <img src="https://eos.org/wp-content/uploads/2019/12/earth-at-night-from-space.jpg" alt="world">
                <div class="text">explore world</div>
            </div>       
            <div class="myslides fade">
                <img src="https://greggvanourek.com/wp-content/uploads/2022/04/Adventure-hiking-among-clouds.jpg" alt="Adventure">
                <div class="text">Adventure awaits</div>
            </div>
        </div>
        <a class="prev" onclick="plusSlides(-1)">❮</a>
        <a class="next" onclick="plusSlides(1)">❯</a>

        <div class="dots">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
        <script>
            let slideIndex= 1
            showSlides(slideIndex)
            function plusSlides(n){
                showSlides(slideIndex +=n)
            }
            function currentSlide(n){
                showSlides(slideIndex=n)
            }
            function showSlides(n){
            let i
            let slide = document.getElementsByClassName("myslides")
            let dots = document.getElementsByClassName("dot")
            if(n>slide.length){slideIndex=1}
            if(n<1){slideIndex=slide.length}
            for(i=0; i<slide.length; i++){
                slide[i].style.display="none"
            }
            for(i=0; i<dots.length; i++){
                dots[i].className=dots[i].className.replace("active","")
        }
        slide[slideIndex-1].style.display="block"
        dots[slideIndex-1].className+="active"
    }
    setInterval(()=>{plusSlides(1)},3000)
        </script>
    </body>
</html>
