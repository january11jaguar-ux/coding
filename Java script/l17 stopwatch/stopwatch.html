<html>
    <head>
        <title>Stop watch</title>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Times New Roman', Times, serif;
            }
            body{
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background:linear-gradient(-45deg,whitesmoke,olive,green);
                animation: grad 8s ease infinite;
            }
            @keyframes grad{
                0% {background-position: 0% 50%;}
                50% {background-position: 100% 50%;}
                100% {background-position: 0% 50%;}
            }
            h1{
                margin-bottom: 20px;
                letter-spacing: 1px;
            }
            .time{
                font-size: 60px;
                margin-bottom: 25px;
                font-weight: bolder;
            }
            button{
                padding:10px 20px ;
                margin: 5px;
                border:none ;
                border-radius:30px ;
                font-size:16px ;
                cursor:pointer ;
                transition:0.3s ;
                color:white ;
            }
            button:hover{
                transform:scale(1.1);
            }
            .start{background: limegreen;}
            .stop{background: red;}
            .reset{background: cadetblue;}
        </style>
    </head>
    <body>
        <h1>Stopwatch</h1>
        <div class="time">
            <span id="seconds">00</span> :<span id="milliseconds">00</span>  
        </div>
        <button class="start" id="start">Start</button>
        <button class="stop" id="stop">Stop</button>
        <button class="reset" id="reset">Reset</button>

        <script>
            let seconds =0
            let milliseconds=0
            let interval = null

            const secEl = document.getElementById("seconds")
            const msEl = document.getElementById("milliseconds")

            document.getElementById("start").onclick = ()=> {
                if(!interval){
                    setInterval(run,10)
                }
            }
             document.getElementById("stop").onclick = ()=> {
                  clearInterval(interval)
                  interval=null
                }
             document.getElementById("reset").onclick = ()=> {
                    clearInterval(interval)
                    interval=null
                    seconds=0
                    milliseconds=0
                    updateDisplay()
                }
                function run(){
                milliseconds++
                if(milliseconds==100){
                    milliseconds=0
                    seconds++
            }
            updateDisplay()
        }
        function updateDisplay(){
            secEl.textContent= seconds.toString().padStart(2,'0')
            msEl.textContent= milliseconds.toString().padStart(2,'0')
        }
        </script>
    </body>
</html>
