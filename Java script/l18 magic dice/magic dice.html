<html>
    <head>
        <title>magic dice</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
       <style>
        body{
            font-family: cursive;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content:center ;
            align-items: center;
            background: linear-gradient(135deg, purple,orchid,white);
            color: azure;
        }
        .container{
            text-align: center;
            background: grey;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px black;
        }
        h1{
            margin-bottom: 10px;
        }
        p{
            opacity: 0.9;
        }
        #dice{
            font-size:200px ;
            margin: 20px 0;
            transition: transition 0.2s;
        }
        #dice :hover{
            cursor: pointer;
            transform: scale(1.1);
        }
        .rolling{
            animation: shake 0.3 infinite;
        }
        @keyframes shake{
            0%{transform: rotate(0deg);}
            25%{transform: rotate(15deg);}
            50%{transform: rotate(-15deg);}
            75%{transform: rotate(10deg);}
            100%{transform: rotate(0deg);}
        }
        button{
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius:10px ;
            background:rgb(118, 77, 162) ;
            color: rgb(27, 26, 26);
            font-weight:600 ;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover{
            transform:scale(1.05) ;
            background: azure;
        }
        #result{
            margin-top: 20px;
            font-size: 22px;
        }
       </style>
    </head>
    <body>
        <div class="container">
            <h1>Magic Dice</h1>
            <p>Click the button or Dice to roll</p>
            <div id="dice" onclick="startstop()">🎲</div>
            <button onclick="startstop()">Roll/stop</button>
            <div id="result"></div>
        </div>
        <script>
            let dice
            let timer
            let stopped=true
            const faces=['⚀','⚁','⚂','⚃','⚄','⚅']
            
            function changeDice(){
                const change = Math.floor(Math.random()*6)
                dice.innerHTML= faces [change]
            }
            
            function startstop(){
                if(stopped){
                    stopped= false
                    dice.classList.add("rolling")
                    timer=setInterval(changeDice,100)
                }else{
                    clearInterval(timer)
                    stopped=true
                    dice.classList.remove("rolling")
                    showResult()
                }
            }
            function showResult(){
                const number= faces.indexOf(dice.innerHTML)+1
                document.getElementById("result").innerHTML="You rolled: <br>"+number+"</br>"
            }
            window.onload= function(){
                dice=document.getElementById("dice")
                changeDice()
            }
        </script>
    </body>
</html>
